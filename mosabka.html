<body>
    <header id="header" class="scrolled">
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo">

                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </div>
            </div>
        </nav>
    </header>

    <main class="competition-page">
        <section class="competition-hero">
            <div class="container">
                <div class="competition-hero-card" data-aos="fade-up">
                    <span class="competition-badge"><i class="fas fa-moon"></i> مسابقة شهر رمضان الكبرى (محدودة المدة)</span>
                    <h1 id="competition-title">مسابقة شهر رمضان الكبرى</h1>
                    <p id="competition-intro"></p>
                    <div class="competition-meta">
                        <span id="competition-deadline"></span>
                        <span><i class="fab fa-whatsapp"></i> واتساب: <strong id="competition-whatsapp"></strong></span>
                    </div>
                </div>
            </div>
        </section>

        <section class="competition-form-section">
            <div class="container">
                <form id="competition-form" class="competition-form">
                    <div class="participant-grid">
                        <label>الاسم الكامل <input type="text" id="fullName" required></label>
                        <label>السن <input type="number" id="age" min="5" max="120" required></label>
                        <label>العنوان <input type="text" id="address" required></label>
                        <label>رقم الهاتف <input type="tel" id="phone" required></label>
                    </div>

                    <div class="questions-wrap" id="questions-wrap"></div>

                    <div class="competition-actions">
                        <button type="button" id="send-whatsapp" class="btn btn-primary">
                            <i class="fab fa-whatsapp"></i>
                            إرسال الإجابات عبر واتساب
                        </button>
                        <button type="button" id="download-pdf" class="btn btn-secondary">
                            <i class="fas fa-file-pdf"></i>
                            تحميل الإجابات PDF
                        </button>
                    </div>

                    <div id="footer-notes" class="footer-notes"></div>
                </form>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script src="pdf-export.js"></script>
